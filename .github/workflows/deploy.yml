name: CI/CD — Deploy Portfolio

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/imbelhouideg/portfolio

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build & Push l'image Docker
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 2 : Déployer sur EC2
  # ─────────────────────────────────────────
  deploy-ec2:
    name: Deploy sur EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH vers EC2 et redémarrer le conteneur
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/imbelhouideg/portfolio:latest
            docker stop portfolio 2>/dev/null || true
            docker rm   portfolio 2>/dev/null || true
            docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 80:80 \
              ghcr.io/imbelhouideg/portfolio:latest
            docker image prune -f
            echo "✅ Déploiement EC2 réussi !"

  # ─────────────────────────────────────────
  # JOB 3 : Déployer sur EKS
  # ─────────────────────────────────────────
  deploy-eks:
    name: Deploy sur EKS
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Installer kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "latest"

      - name: Installer Helm
        uses: azure/setup-helm@v3
        with:
          version: "latest"

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region eu-north-1 --name portfolio-cluster

      - name: Deploy sur EKS avec Helm
        run: |
          helm upgrade portfolio \
            --set image.repository=ghcr.io/imbelhouideg/portfolio \
            --set image.tag=${{ github.sha }} \
            --reuse-values \
            portfolio
      - name: Vérifier le déploiement
        run: |
          kubectl rollout status deployment/portfolio
          kubectl get pods
          echo "✅ Déploiement EKS réussi !"

  # ─────────────────────────────────────────
  # JOB 4 : Notification Slack
  # ─────────────────────────────────────────
  notify:
    name: Notification Slack
    runs-on: ubuntu-latest
    needs: [deploy-ec2, deploy-eks]
    if: always()
    steps:
      - name: Notif succès
        if: needs.deploy-ec2.result == 'success' && needs.deploy-eks.result == 'success'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "✅ *Déploiement réussi sur EC2 + EKS !*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Projet",   "value": "Portfolio Imad Eddine", "short": true },
                    { "title": "Branche",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",   "value": "${{ github.event.head_commit.message }}", "short": false },
                    { "title": "Auteur",   "value": "${{ github.actor }}", "short": true },
                    { "title": "Statut",   "value": "🟢 EC2 + EKS Live", "short": true }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notif échec
        if: needs.deploy-ec2.result == 'failure' || needs.deploy-eks.result == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "❌ *Déploiement échoué !*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Projet",   "value": "Portfolio Imad Eddine", "short": true },
                    { "title": "Branche",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",   "value": "${{ github.event.head_commit.message }}", "short": false },
                    { "title": "EC2",      "value": "${{ needs.deploy-ec2.result }}", "short": true },
                    { "title": "EKS",      "value": "${{ needs.deploy-eks.result }}", "short": true },
                    { "title": "Action",   "value": "Vérifie les logs GitHub Actions", "short": false }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
