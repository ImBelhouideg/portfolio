name: CI/CD — Deploy Portfolio

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/imbelhouideg/portfolio

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build & Push l'image Docker
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 2 : Déployer sur EC2
  # ─────────────────────────────────────────
  deploy:
    name: Deploy sur EC2
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: SSH vers EC2 et redémarrer le conteneur
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ghcr.io/imbelhouideg/portfolio:latest
            docker stop portfolio 2>/dev/null || true
            docker rm   portfolio 2>/dev/null || true
            docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 80:80 \
              ghcr.io/imbelhouideg/portfolio:latest
            docker image prune -f
            echo "✅ Déploiement réussi !"

  # ─────────────────────────────────────────
  # JOB 3 : Notification Slack
  # ─────────────────────────────────────────
  notify:
    name: Notification Slack
    runs-on: ubuntu-latest
    needs: deploy
    if: always() # S'exécute même si deploy échoue
    steps:
      - name: Notif succès
        if: needs.deploy.result == 'success'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "✅ *Déploiement réussi !*",
              "attachments": [
                {
                  "color": "good",
                  "fields": [
                    { "title": "Projet",   "value": "Portfolio Imad Eddine", "short": true },
                    { "title": "Branche",  "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",   "value": "${{ github.event.head_commit.message }}", "short": false },
                    { "title": "Auteur",   "value": "${{ github.actor }}", "short": true },
                    { "title": "Statut",   "value": "🟢 Live sur EC2", "short": true }
                  ]
                }
              ]
            }

      - name: Notif échec
        if: needs.deploy.result == 'failure'
        uses: slackapi/slack-github-action@v1.27.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "❌ *Déploiement échoué !*",
              "attachments": [
                {
                  "color": "danger",
                  "fields": [
                    { "title": "Projet",  "value": "Portfolio Imad Eddine", "short": true },
                    { "title": "Branche", "value": "${{ github.ref_name }}", "short": true },
                    { "title": "Commit",  "value": "${{ github.event.head_commit.message }}", "short": false },
                    { "title": "Auteur",  "value": "${{ github.actor }}", "short": true },
                    { "title": "Action",  "value": "Vérifie les logs GitHub Actions", "short": false }
                  ]
                }
              ]
            }
