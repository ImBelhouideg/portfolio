name: CI/CD — Deploy Portfolio

# Déclenché à chaque push sur main
on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner | lower && upper }}/portfolio

jobs:
  # ─────────────────────────────────────────
  # JOB 1 : Build & Push l'image Docker
  # ─────────────────────────────────────────
  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write # Nécessaire pour push sur GHCR

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Login sur GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build et Push l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # ─────────────────────────────────────────
  # JOB 2 : Déployer sur EC2 via SSH
  # ─────────────────────────────────────────
  deploy:
    name: Deploy sur EC2
    runs-on: ubuntu-latest
    needs: build # Attend que le build réussisse

    steps:
      - name: SSH vers EC2 et redémarrer le conteneur
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull la dernière image
            docker pull ghcr.io/${{ github.repository_owner }}/portfolio:latest

            # Stopper et supprimer l'ancien conteneur s'il existe
            docker stop portfolio 2>/dev/null || true
            docker rm   portfolio 2>/dev/null || true

            # Lancer le nouveau conteneur
            docker run -d \
              --name portfolio \
              --restart unless-stopped \
              -p 80:80 \
              ghcr.io/${{ github.repository_owner }}/portfolio:latest

            # Nettoyer les vieilles images
            docker image prune -f

            echo "✅ Déploiement réussi !"
